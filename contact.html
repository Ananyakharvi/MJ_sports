<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Details</title>

    <style>
       * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    background: #eef3ff;
}

/* NAVBAR */
.navbar {
    width: 100%;
    background: #1f3347;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.25);
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
}

.nav-left span {
    font-size: 26px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

.navbar ul li a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.3s ease;
}

.navbar ul li a:hover {
    background: #3498db;
}

/* MAIN SECTION */
.wrapper {
    display: flex;
    justify-content: center;
    padding: 50px 20px;
}

.container {
    width: 100%;
    max-width: 1150px;
    display: flex;
    background: white;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

/* LEFT SECTION */
.left {
    width: 45%;
    padding: 50px;
    background: linear-gradient(135deg, #1f3347, #3a7bd5);
    color: white;
}

.left h1 {
    font-size: 34px;
    margin-bottom: 25px;
}

.info-box {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 22px;
    transition: 0.3s ease;
}

.info-box:hover {
    transform: translateX(5px);
    background: rgba(255,255,255,0.3);
}

.info-title {
    font-size: 17px;
    opacity: 0.9;
}

.info-text {
    font-size: 15px;
    margin-top: 8px;
}

/* RIGHT SECTION */
.right {
    width: 55%;
    padding: 30px;
    background: #f8fbff;
}

.shop-img {
    width: 100%;
    height: 260px;
    border-radius: 18px;
    object-fit: cover;
    box-shadow: 0 6px 18px rgba(0,0,0,0.20);
    margin-bottom: 30px;   /* ⚠ more spacing here */
    transition: 0.3s ease;
}

.shop-img:hover {
    transform: scale(1.02);
}

/* MAP */
iframe {
    width: 100%;
    height: 270px;
    border: none;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    transition: 0.3s ease;
}

iframe:hover {
    transform: scale(1.01);
}

    </style>
</head>

<body>

    <!-- NAVBAR WITH LOGO -->
    <div class="navbar">
        <div class="nav-left">
            <img src="images/logo.jpg" class="nav-logo">
            <span>MJ SPORTS RANEBENNUR</span>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
            
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="wrapper">
        <div class="container">

            <!-- LEFT SECTION -->
            <div class="left">
                <h1>MJ Sports</h1>

                <div class="info-box">
                    <p class="info-title">Shop Address</p>
                    <p class="info-text">M J Sports, Bus Stand, Near Biside Suraj Lodge, Ashok Nagar, Mruthyunjaya Nagar, Ranebennur, Karnataka 581115</p>
                </div>

                <div class="info-box">
                    <p class="info-title">Contact Number</p>
                    <p class="info-text">+91 9611685538, +91 9980277625</p>
                </div>

                <div class="info-box">
                    <p class="info-title">Email</p>
                    <p class="info-text">mjsports@gmail.com</p>
                </div>
            </div>

            <!-- RIGHT SECTION -->
            <div class="right">
                <img src="images/shop pic.jpg"
                     class="shop-img" alt="Shop Image">

                <!-- Google Map -->
                 <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1249.5088745926162!2d75.63280570606408!3d14.616366221943101!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bb97f8ccc55f20b%3A0x89f4bffaaefa87ef!2sM%20J%20sports!5e0!3m2!1sen!2sin!4v1763097117645!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                
            </div>

        </div>
    </div>

</body>
</html>
